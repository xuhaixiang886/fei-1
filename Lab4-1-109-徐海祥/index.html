<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>定位展示知识点视图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
            font-family: "微软雅黑", sans-serif;
        }

        .container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 30px auto;
            border: 1px solid #333;
            background: #f8f8f8;
        }

        
        .center-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            z-index: 10;
        }

   
        .panel {
            position: absolute;
            width: 260px;
            background: #e0e0e0;
            border: 1px solid #999;
            padding: 12px;
            z-index: 5;
        }

        .title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .panel li {
            line-height: 1.7;
            padding-left: 15px;
            position: relative;
        }

        .panel li::before {
            content: "●";
            position: absolute;
            left: 0;
            font-size: 10px;
        }

 
        .html {
            top: 50px;
            left: 50px;
        }

  
        .css {
            bottom: 50px;
            left: 50px;
        }

       
        .js {
            bottom: 50px;
            right: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="center-img">
            <img src="html-css.jpg" alt="图标" style="width:100%;height:100%;object-fit:contain;">
        </div>

      
        <div class="panel html">
            <div class="title">HTML基础和HTML5</div>
            <ul>
                <li>HTML标签与属性</li>
                <li>HTML5多媒体（视频和音频）</li>
                <li>HTML5图像标签（画布和SVG）</li>
                <li>HTML5地理定位</li>
                <li>HTML5表单</li>
            </ul>
        </div>
        <div class="panel css">
            <div class="title">CSS基础和CSS3</div>
            <ul>
                <li>CSS选择器</li>
                <li>CSS样式</li>
                <li>CSS盒模型与定位</li>
                <li>CSS3的2D与3D转换</li>
                <li>CSS3的过渡与动画</li>
                <li>CSS3新的边框效果</li>
            </ul>
        </div>
        <div class="panel js">
            <div class="title">JavaScript</div>
            <ul>
                <li>数据类型</li>
                <li>运算符</li>
                <li>基础语法</li>
                <li>BOM对象</li>
                <li>DOM对象</li>
                <li>JS特效</li>
            </ul>
        </div>
    </div>
</body>
</html>
